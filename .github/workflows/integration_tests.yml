name: Integration Tests
on:
  push:
    branches:
      - main

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: procrastinate
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install project
        run: |
          uv sync --frozen
          uv pip install celery"${{ matrix.celery-version }}"
      - name: Run tests
        run: uv run --no-sync pytest integration_tests -vs
        env:
          TASKBADGER_ORG: ${{ vars.TASKBADGER_ORG }}
          TASKBADGER_PROJECT: ${{ vars.TASKBADGER_PROJECT }}
          TASKBADGER_API_KEY: ${{ secrets.TASKBADGER_API_KEY }}
          PROCRASTINATE_DSN: postgresql://postgres:postgres@localhost:5432/procrastinate
